# Pin the project name so the named volumes (e.g. app-db-data) keep a stable,
# directory-independent name. Without this, launching from a renamed/cloned/
# differently-cased path creates fresh empty volumes -> the DB appears wiped.
name: prepare-extraction-tool

services:
  postgres:
    image: postgres:18
    container_name: PREPARE-POSTGRESQL
    restart: unless-stopped
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}

  adminer:
    image: adminer
    container_name: PREPARE-ADMINER
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - default
    depends_on:
      - postgres
    environment:
      - ADMINER_DESIGN=pepa-linha-dark

  elasticsearch:
    image: elasticsearch:8.19.7
    container_name: PREPARE-ELASTICSEARCH
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
      - xpack.security.enabled=false
      - path.repo=/usr/share/elasticsearch/snapshots
    expose:
      - "9200"
      - "9300"
    volumes:
      - app-es-data:/usr/share/elasticsearch/data
      - ./seed_data/es_repo:/usr/share/elasticsearch/snapshots
    networks:
      - prepare-public
      - default
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  backend:
    image: "${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}"
    container_name: PREPARE-BACKEND
    restart: unless-stopped
    expose:
      - "8000"
    networks:
      - prepare-public
      - default
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      bioner:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Bioner reachable by compose service name inside the network (overrides .env localhost)
      - EXTRACT_HOST=http://bioner:${BIONER_PORT:-5600}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - POSTGRES_SERVER=${POSTGRES_SERVER}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - DATABASE_URL=postgresql://${POSTGRES_USER?Variable not set}:${POSTGRES_PASSWORD?Variable not set}@postgres:5432/${POSTGRES_DB?Variable not set}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      # Persistent HuggingFace cache (shared with bioner) for embedding model downloads
      - HF_HOME=/.cache
    volumes:
      - ./.cache:/.cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/check"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    build:
      context: ./backend

  frontend:
    image: "${DOCKER_IMAGE_FRONTEND?Variable not set}:${TAG-latest}"
    container_name: PREPARE-FRONTEND
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - prepare-public
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    build:
      context: ./frontend
      args:
        - NODE_ENV=production

  bioner:
    build:
      context: ./bioner
    image: "${DOCKER_IMAGE_BIONER:-bioner}:${TAG:-latest}"
    container_name: PREPARE-BIONER
    restart: unless-stopped
    expose:
      - "${BIONER_PORT:-5600}"
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    env_file:
      - .env
    volumes:
      # Model library: trained models (written here per run) + hand-placed local models
      - ./bioner/models:/models
      # Shared, persistent HuggingFace cache (downloaded models persist across restarts)
      - ./.cache:/.cache
    environment:
      - ENGINE=${BIONER_ENGINE?Variable not set}
      - MODEL=${BIONER_MODEL?Variable not set}
      - ADAPTER_MODEL=${BIONER_ADAPTER_MODEL}
      - HOST=${BIONER_HOST?Variable not set}
      - PORT=${BIONER_PORT?Variable not set}
      - USE_GPU=${BIONER_USE_GPU}
      - ADAPTER_PATH=${BIONER_ADAPTER_PATH}
      - PROMPTS_PATH=${BIONER_PROMPTS_PATH}
      # Where trained models are saved (inside the /models library volume)
      - BIONER_MODELS_DIR=/models
      # Persistent HuggingFace cache location
      - HF_HOME=/.cache
      # Backend reachable by compose service name inside the network (overrides .env localhost)
      - BACKEND_HOST=http://backend:8000
      # GLiNER fine-tuning window budget (read by app/core/settings.py)
      - BIONER_TRAIN_MAX_TOKENS=${BIONER_TRAIN_MAX_TOKENS:-256}
      - BIONER_TRAIN_CONTEXT_PAD=${BIONER_TRAIN_CONTEXT_PAD:-64}
      - BIONER_TRAIN_MICRO_BATCH=${BIONER_TRAIN_MICRO_BATCH:-2}
      # Eval-loss interval in optimizer steps (0 = auto ~18 points; 1 = every step)
      - BIONER_TRAIN_EVAL_STEPS=${BIONER_TRAIN_EVAL_STEPS:-0}
    healthcheck:
      test:
        ["CMD", "curl", "-f", "http://localhost:${BIONER_PORT:-5600}/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 600s
    networks:
      - prepare-public
      - default
    command:
      - python
      - -m
      - app.main
      - --engine
      - "${BIONER_ENGINE}"
      - --model
      - "${BIONER_MODEL}"
      - --adapter_model
      - "${BIONER_ADAPTER_MODEL}"
      - --host
      - "${BIONER_HOST}"
      - --port
      - "${BIONER_PORT}"
      - --use_gpu
      - "${BIONER_USE_GPU}"

volumes:
  app-db-data:
  app-es-data:

networks:
  prepare-public:
    # Set to true if the network is already created
    external: false
